<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MarkZnak PRO Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; margin: 0; padding: 15px; overflow-x: hidden; transition: background-color 0.2s; }
        .btn { background: #0088cc; color: white; border: none; padding: 18px; font-size: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 12px; }
        .btn-box { background: #28a745; } 
        .btn-stop { background: #f39c12 !important; } 
        .btn-export { background: #2ecc71 !important; } 
        .btn-exit { background: #34495e !important; font-size: 14px; padding: 10px; margin-top: 10px; }
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: black; display: none; margin-bottom: 15px; border: 3px solid #0088cc; }
        .log { text-align: left; font-size: 11px; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 8px; word-break: break-all; max-height: 120px; overflow-y: auto; }
        .status { color: #0088cc; font-weight: bold; margin: 10px 0; min-height: 20px; }
        .box-info { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 2px dashed #28a745; font-weight: bold; font-size: 18px; }
        .flash-success { background-color: #d4edda !important; }
    </style>
</head>
<body>
    <h2>MarkZnak PRO</h2>
    <div id="boxDisplay" class="box-info">Коробка: НЕ НАЧАТА</div>
    
    <button id="boxBtn" class="btn btn-box" onclick="toggleBox()">НАЧАТЬ НОВУЮ КОРОБКУ</button>
    <button id="startBtn" class="btn" onclick="toggleScanner()" style="display:none;">ВКЛЮЧИТЬ КАМЕРУ</button>
    
    <div id="reader"></div>
    
    <div id="status" class="status">Готов к работе</div>
    <div id="log" class="log">История сканирования...</div>
    
    <button class="btn btn-export" onclick="exportData()">ОТПРАВИТЬ EXCEL В ЧАТ</button>
    <button class="btn btn-exit" onclick="tg.close()">ВЫЙТИ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwTC5DDB4Gdm6sX0iUG6HyAYiMzmFjBjpZhNkxWr556EXUCSWc-Crs33mOJV4nWxs2e/exec";
        
        let html5QrCode;
        let isScanning = false;
        let lastResult = "";
        let currentBox = "";
        let scannedCount = 0;

        // Продвинутая вибрация + вспышка для старых версий ТГ
        function doVibrate() {
            // Вспышка экрана
            document.body.classList.add('flash-success');
            setTimeout(() => document.body.classList.remove('flash-success'), 200);

            try {
                if (tg.HapticFeedback && tg.isVersionAtLeast('6.1')) {
                    tg.HapticFeedback.impactOccurred('heavy');
                    setTimeout(() => tg.HapticFeedback.impactOccurred('heavy'), 150);
                } else if (navigator.vibrate) {
                    navigator.vibrate([100, 50, 100]); // Браузерная вибрация
                }
            } catch (e) { console.log("Вибрация не поддерживается"); }
        }

        function toggleBox() {
            const boxBtn = document.getElementById('boxBtn');
            const startBtn = document.getElementById('startBtn');
            const display = document.getElementById('boxDisplay');

            if (!currentBox) {
                currentBox = "BOX-" + Math.floor(Date.now() / 1000);
                scannedCount = 0;
                display.innerText = "ТЕКУЩАЯ: " + currentBox + " (0 шт)";
                boxBtn.innerText = "ЗАВЕРШИТЬ ТЕКУЩУЮ";
                boxBtn.classList.add('btn-stop');
                startBtn.style.display = "block";
                if (tg.isVersionAtLeast('6.1')) tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.showConfirm(`Завершить коробку ${currentBox}?`, (ok) => {
                    if (ok) {
                        currentBox = "";
                        display.innerText = "Коробка: ЗАВЕРШЕНА";
                        boxBtn.innerText = "НАЧАТЬ СЛЕДУЮЩУЮ";
                        boxBtn.classList.remove('btn-stop');
                        scannedCount = 0;
                    }
                });
            }
        }

        function toggleScanner() {
            const reader = document.getElementById('reader');
            const btn = document.getElementById('startBtn');
            if (!isScanning) {
                reader.style.display = 'block';
                btn.innerText = "ВЫКЛЮЧИТЬ КАМЕРУ";
                btn.style.background = "#ff4444";
                startCamera();
                isScanning = true;
            } else {
                stopCamera();
            }
        }

        function startCamera() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: 250 }, 
                (decodedText) => {
                    if (decodedText === lastResult) return;
                    lastResult = decodedText;
                    doVibrate(); 
                    processCode(decodedText);
                    setTimeout(() => { lastResult = ""; }, 3000);
                }
            );
        }

        function stopCamera() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').style.display = 'none';
                    document.getElementById('startBtn').innerText = "ВКЛЮЧИТЬ КАМЕРУ";
                    document.getElementById('startBtn').style.background = "#0088cc";
                    isScanning = false;
                });
            }
        }

        async function processCode(code) {
            const logDiv = document.getElementById('log');
            const display = document.getElementById('boxDisplay');
            scannedCount++;
            display.innerText = "ТЕКУЩАЯ: " + currentBox + " (" + scannedCount + " шт)";
            logDiv.innerHTML = `<div><b>#${scannedCount}</b>: ${code.substring(0,30)}...</div>` + logDiv.innerHTML;
            
            const data = {
                userId: tg.initDataUnsafe?.user?.id || "unknown",
                userName: tg.initDataUnsafe?.user?.username || "no_name",
                code: code,
                sessionId: currentBox
            };

            fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
        }

        async function exportData() {
            const statusDiv = document.getElementById('status');
            const userId = tg.initDataUnsafe?.user?.id || "unknown";
            statusDiv.innerText = "⏳ Файл готовится...";
            
            // Запасной метод через GET для старых версий
            const exportUrl = `${WEB_APP_URL}?userId=${userId}&command=export`;

            try {
                await fetch(exportUrl, { method: "GET", mode: "no-cors" });
                statusDiv.innerText = "✅ Проверь чат бота!";
            } catch (e) {
                statusDiv.innerText = "❌ Ошибка связи";
            }
        }
    </script>
</body>
</html>
