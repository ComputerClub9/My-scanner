<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MarkZnak PRO Scanner</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f9; margin: 0; padding: 15px; overflow-x: hidden; }
        .btn { background: #0088cc; color: white; border: none; padding: 18px; font-size: 18px; border-radius: 12px; cursor: pointer; width: 100%; font-weight: bold; margin-bottom: 12px; }
        .btn-box { background: #28a745; } 
        .btn-stop { background: #f39c12 !important; } /* Оранжевый для смены коробки */
        .btn-export { background: #2ecc71 !important; } /* Зеленая для экспорта */
        .btn-exit { background: #34495e !important; font-size: 14px; padding: 10px; margin-top: 10px; } /* Темная для выхода */
        #reader { width: 100%; border-radius: 12px; overflow: hidden; background: black; display: none; margin-bottom: 15px; }
        .log { text-align: left; font-size: 11px; background: #fff; padding: 10px; border: 1px solid #ddd; border-radius: 8px; word-break: break-all; max-height: 120px; overflow-y: auto; }
        .status { color: #0088cc; font-weight: bold; margin: 10px 0; min-height: 20px; }
        .box-info { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 2px dashed #28a745; font-weight: bold; }
    </style>
</head>
<body>
    <h2>MarkZnak PRO</h2>
    
    <div id="boxDisplay" class="box-info">Коробка: НЕ НАЧАТА</div>
    
    <button id="boxBtn" class="btn btn-box" onclick="toggleBox()">НАЧАТЬ НОВУЮ КОРОБКУ</button>
    <button id="startBtn" class="btn" onclick="toggleScanner()" style="display:none;">ВКЛЮЧИТЬ КАМЕРУ</button>
    
    <div id="reader"></div>
    
    <div id="status" class="status">Готов к работе</div>
    <div id="log" class="log">Здесь появится расшифровка кода...</div>
    
    <button class="btn btn-export" onclick="exportData()">ОТПРАВИТЬ EXCEL В ЧАТ</button>
    <button class="btn btn-exit" onclick="tg.close()">ВЫЙТИ ИЗ ПРИЛОЖЕНИЯ</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ТВОЙ НОВЫЙ URL
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzMP9donSgTjLslCyeGw5Jd72_vW6Z7yfQjntCN5EbsNC3msR3ySQuTj4o-OZD3HJRd/exec";
        
        let html5QrCode;
        let isScanning = false;
        let lastResult = "";
        let currentBox = "";
        let scannedCount = 0;

        function toggleBox() {
            const boxBtn = document.getElementById('boxBtn');
            const startBtn = document.getElementById('startBtn');
            const display = document.getElementById('boxDisplay');

            if (!currentBox) {
                currentBox = "BOX-" + Math.floor(Date.now() / 1000);
                scannedCount = 0;
                display.innerText = "ТЕКУЩАЯ: " + currentBox + " (0 шт)";
                boxBtn.innerText = "ЗАВЕРШИТЬ ТЕКУЩУЮ";
                boxBtn.classList.add('btn-stop');
                startBtn.style.display = "block";
                tg.HapticFeedback.notificationOccurred('success');
            } else {
                tg.showConfirm(`Завершить коробку ${currentBox} и начать новую?`, (ok) => {
                    if (ok) {
                        currentBox = "";
                        display.innerText = "Коробка: ГОТОВА К НОВОЙ";
                        boxBtn.innerText = "НАЧАТЬ СЛЕДУЮЩУЮ";
                        boxBtn.classList.remove('btn-stop');
                        scannedCount = 0;
                        tg.HapticFeedback.notificationOccurred('warning');
                    }
                });
            }
        }

        function toggleScanner() {
            const reader = document.getElementById('reader');
            const btn = document.getElementById('startBtn');
            if (!isScanning) {
                reader.style.display = 'block';
                btn.innerText = "ВЫКЛЮЧИТЬ КАМЕРУ";
                btn.style.background = "#ff4444";
                startCamera();
                isScanning = true;
            } else {
                stopCamera();
            }
        }

        function startCamera() {
            html5QrCode = new Html5Qrcode("reader");
            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 12, qrbox: 250 }, 
                (decodedText) => {
                    if (decodedText === lastResult) return;
                    lastResult = decodedText;
                    tg.HapticFeedback.impactOccurred('heavy'); 
                    processCode(decodedText);
                    setTimeout(() => { lastResult = ""; }, 2500);
                }
            ).catch(err => {
                document.getElementById('status').innerText = "Ошибка камеры";
            });
        }

        function stopCamera() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').style.display = 'none';
                    document.getElementById('startBtn').innerText = "ВКЛЮЧИТЬ КАМЕРУ";
                    document.getElementById('startBtn').style.background = "#0088cc";
                    isScanning = false;
                });
            }
        }

        async function processCode(code) {
            const logDiv = document.getElementById('log');
            const statusDiv = document.getElementById('status');
            const display = document.getElementById('boxDisplay');
            
            scannedCount++;
            display.innerText = "ТЕКУЩАЯ: " + currentBox + " (" + scannedCount + " шт)";
            logDiv.innerHTML = `<div><b>#${scannedCount}</b>: ${code.substring(0,30)}...</div>` + logDiv.innerHTML;
            statusDiv.innerText = "⏳ Сохранение...";

            const data = {
                userId: tg.initDataUnsafe?.user?.id || "unknown",
                userName: tg.initDataUnsafe?.user?.username || "no_name",
                code: code,
                sessionId: currentBox
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(data)
                });
                statusDiv.innerText = "✅ Принято";
            } catch (e) {
                statusDiv.innerText = "❌ Ошибка!";
                tg.HapticFeedback.notificationOccurred('error');
            }
        }

        async function exportData() {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "⏳ Файл готовится...";
            
            const data = {
                userId: tg.initDataUnsafe?.user?.id || "unknown",
                code: "COMMAND_EXPORT",
                sessionId: "COMMAND"
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: "POST",
                    mode: "no-cors",
                    body: JSON.stringify(data)
                });
                statusDiv.innerText = "✅ Файл отправлен в бот!";
                tg.HapticFeedback.notificationOccurred('success');
            } catch (e) {
                statusDiv.innerText = "❌ Ошибка экспорта";
            }
        }
    </script>
</body>
</html>
