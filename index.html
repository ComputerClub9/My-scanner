<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MarkZnak PRO</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --tg-theme-button-color: #0088cc;
            --success-color: #28a745;
            --warning-color: #f39c12;
            --error-color: #d9534f;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            text-align: center; 
            background-color: var(--tg-theme-secondary-bg-color, #f4f4f9); 
            color: var(--tg-theme-text-color, #222);
            margin: 0; padding: 15px; overflow-x: hidden;
        }
        .container { max-width: 450px; margin: 0 auto; }
        .box-info { 
            background: var(--tg-theme-bg-color, #fff); 
            padding: 20px; border-radius: 16px; 
            margin-bottom: 15px; border: 1px solid rgba(0,0,0,0.1);
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .box-id { font-size: 22px; font-weight: bold; color: var(--success-color); }
        .btn { 
            display: block; width: 100%; padding: 18px; 
            font-size: 16px; font-weight: bold; border-radius: 14px; 
            border: none; cursor: pointer; margin-bottom: 12px;
            transition: transform 0.1s;
        }
        .btn:active { transform: scale(0.98); }
        .btn-box { background: var(--success-color); color: white; }
        .btn-stop { background: var(--warning-color) !important; color: white; }
        .btn-export { background: #6f42c1; color: white; }
        .btn-exit { background: #34495e; color: white; font-size: 14px; padding: 12px; }
        
        #reader { width: 100%; border-radius: 16px; overflow: hidden; background: black; display: none; margin-bottom: 15px; border: 3px solid #0088cc; }
        
        .log { 
            text-align: left; font-size: 13px; background: #fff; 
            padding: 12px; border-radius: 12px; border: 1px solid #ddd;
            max-height: 140px; overflow-y: auto; margin-top: 10px;
        }
        .status { font-weight: bold; margin: 10px 0; color: #0088cc; height: 20px; }
        .flash-success { background-color: #d4edda !important; }
    </style>
</head>
<body>
    <div class="container">
        <h2>MarkZnak PRO</h2>
        <div class="box-info">
            <div style="font-size: 12px; color: #888;">ТЕКУЩАЯ СЕССИЯ</div>
            <div id="boxDisplay" class="box-id">НЕ НАЧАТА</div>
            <div id="countDisplay" style="font-size: 14px; margin-top: 5px;">Сканирований: 0</div>
        </div>
        
        <button id="boxBtn" class="btn btn-box" onclick="toggleBox()">📦 НАЧАТЬ КОРОБКУ</button>
        
        <div id="reader"></div>
        
        <div id="status" class="status">Готов к работе</div>
        <div id="log" class="log">История сканирования...</div>
        
        <button class="btn btn-export" onclick="exportData()">📥 ОТПРАВИТЬ EXCEL В ЧАТ</button>
        <button class="btn btn-exit" onclick="tg.close()">ВЫЙТИ</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // ТВОЙ НОВЫЙ URL
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyfBwAf4GW8HODYiPZffjiFcUPpb8Q5H3qh-Su9PSX6f6kVZ0LjKRxmhQ39AwMiTZHq/exec";
        
        let html5QrCode;
        let currentBox = "";
        let scannedCount = 0;
        let sessionCodes = new Set(); // ЗАЩИТА ОТ ДУБЛЕЙ

        function doVibrate(type = 'success') {
            document.body.classList.add('flash-success');
            setTimeout(() => document.body.classList.remove('flash-success'), 200);
            try {
                if (tg.HapticFeedback) {
                    if (type === 'error') tg.HapticFeedback.notificationOccurred('error');
                    else tg.HapticFeedback.impactOccurred('medium');
                }
            } catch (e) {}
        }

        function toggleBox() {
            const btn = document.getElementById('boxBtn');
            const display = document.getElementById('boxDisplay');

            if (!currentBox) {
                currentBox = "BOX-" + Math.floor(Date.now() / 1000).toString().slice(-6);
                sessionCodes.clear();
                scannedCount = 0;
                display.innerText = currentBox;
                document.getElementById('countDisplay').innerText = "Сканирований: 0";
                btn.innerText = "🛑 ЗАВЕРШИТЬ КОРОБКУ";
                btn.classList.add('btn-stop');
                startCamera();
            } else {
                tg.showConfirm(`Завершить коробку ${currentBox}?`, (ok) => {
                    if (ok) {
                        currentBox = "";
                        display.innerText = "ЗАВЕРШЕНА";
                        btn.innerText = "📦 НАЧАТЬ СЛЕДУЮЩУЮ";
                        btn.classList.remove('btn-stop');
                        stopCamera();
                    }
                });
            }
        }

        function startCamera() {
            const reader = document.getElementById('reader');
            reader.style.display = 'block';
            html5QrCode = new Html5Qrcode("reader");
            const config = { 
                fps: 20, 
                qrbox: { width: 250, height: 250 },
                formatsToSupport: [ Html5QrcodeSupportedFormats.DATA_MATRIX, Html5QrcodeSupportedFormats.QR_CODE ]
            };
            
            html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
                processCode(decodedText);
            }).catch(err => {
                document.getElementById('status').innerText = "Ошибка камеры: " + err;
            });
        }

        function stopCamera() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').style.display = 'none';
                });
            }
        }

        async function processCode(code) {
            const statusDiv = document.getElementById('status');
            
            // ЗАЩИТА ОТ ДУБЛЕЙ
            if (sessionCodes.has(code)) {
                doVibrate('error');
                statusDiv.innerText = "⚠️ КОД УЖЕ СКАНЕРОВАН!";
                statusDiv.style.color = "red";
                setTimeout(() => { statusDiv.style.color = "#0088cc"; statusDiv.innerText = "Сканируйте..."; }, 2000);
                return;
            }

            sessionCodes.add(code);
            scannedCount++;
            document.getElementById('countDisplay').innerText = "Сканирований: " + scannedCount;
            doVibrate(); 
            
            const logDiv = document.getElementById('log');
            const shortCode = code.length > 20 ? code.substring(0, 20) + "..." : code;
            logDiv.innerHTML = `<div><b>#${scannedCount}</b>: ${shortCode}</div>` + logDiv.innerHTML;
            
            const data = {
                userId: String(tg.initDataUnsafe?.user?.id || "unknown"),
                userName: tg.initDataUnsafe?.user?.username || "no_name",
                code: code,
                sessionId: currentBox
            };

            fetch(WEB_APP_URL, { 
                method: "POST", 
                mode: "no-cors", 
                body: JSON.stringify(data) 
            });
        }

        async function exportData() {
            const statusDiv = document.getElementById('status');
            const userId = String(tg.initDataUnsafe?.user?.id || "unknown");
            statusDiv.innerText = "⏳ Файл готовится...";
            try {
                await fetch(`${WEB_APP_URL}?userId=${userId}&command=export`, { method: "GET", mode: "no-cors" });
                statusDiv.innerText = "✅ Проверь чат бота!";
            } catch (e) {
                statusDiv.innerText = "❌ Ошибка связи";
            }
        }
    </script>
</body>
</html>
